services:
  firebase:
    build: ./firebase
    volumes:
      - ./firebase:/firebase

  workspace:
    environment:
      - FIRESTORE_EMULATOR_HOST=firebase:8080
      - GOOGLE_CLOUD_PROJECT=demo-project
    image: debian:trixie
    volumes:
      - .:/workspaces/shiori-web:cached
      - ~/.agents:/home/vscode/.agents
      - ~/.claude:/home/vscode/.claude
      - ~/.copilot:/home/vscode/.copilot
