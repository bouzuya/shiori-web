name: ci
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cargo +nightly fmt -- --check
            cargo clippy -- -D warnings
            cargo test
