<!DOCTYPE html>
<html data-color-scheme="{{ color_scheme }}" lang="ja">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Edit {{ title }} - shiori</title>
    <link href="{{ base }}/favicon.svg" rel="icon" type="image/svg+xml">
    <link href="{{ base }}/index.css" rel="stylesheet">
</head>

<body>
    <div class="page show-page">
        {% include "_page_header.html" %}
        <main>
            <div class="main-scroll">
                <h1>{{ title }}</h1>
                <div class="back-link">
                    <a href="{% if base == "" %}/{% else %}{{ base }}{% endif %}">Back</a>
                </div>

                <form class="edit-bookmark-form" action="{{ base }}/{{ bookmark_id }}?_method=PATCH" method="post">
                    <input type="hidden" name="updated_at" value="{{ updated_at }}">
                    <div class="form-fields">
                        <div class="form-field">
                            <label for="url">URL</label>
                            <input id="url" type="url" name="url" value="{{ url }}" required>
                        </div>
                        <div class="form-field">
                            <label for="title">Title</label>
                            <input id="title" type="text" name="title" value="{{ title }}">
                        </div>
                        <div class="form-field">
                            <label for="comment">Comment</label>
                            <input id="comment" type="text" name="comment" value="{{ comment }}">
                        </div>
                    </div>
                    <div class="form-submit">
                        <button type="submit">Update</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
