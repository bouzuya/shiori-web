<!DOCTYPE html>
<html data-color-scheme="{{ color_scheme }}" lang="ja">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>New Bookmark - shiori</title>
    <link rel="stylesheet" href="{{ base }}/index.css">
</head>

<body>
    <div class="page new-page">
        <header class="page-header">
            <div class="site-title"><a href="{% if base == "" %}/{% else %}{{ base }}{% endif %}">shiori</a></div>
        </header>
        <main>
            <div class="main-scroll">
                <h1>New Bookmark</h1>
                <div class="back-link">
                    <a href="{% if base == "" %}/{% else %}{{ base }}{% endif %}">Back</a>
                </div>
                <form class="new-bookmark-form" action="{% if base == "" %}/{% else %}{{ base }}{% endif %}" method="post">
                    <div class="form-fields">
                        <div class="form-field">
                            <label for="url">URL</label>
                            <input id="url" type="url" name="url" value="{{ url }}" required>
                        </div>
                        <div class="form-field">
                            <label for="title">Title</label>
                            <input id="title" type="text" name="title" value="{{ title }}">
                        </div>
                        <div class="form-field">
                            <label for="comment">Comment</label>
                            <input id="comment" type="text" name="comment" value="{{ comment }}">
                        </div>
                    </div>
                    <div class="form-submit">
                        <button type="submit">Add</button>
                    </div>
                </form>
            </div>
        </main>
        <footer class="page-footer">
            <div>
                <a href="https://github.com/bouzuya/shiori-web" rel="noopener noreferrer" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>
</body>

</html>
