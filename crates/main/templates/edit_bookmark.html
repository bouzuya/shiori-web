<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Edit Bookmark</title>
    <link rel="stylesheet" href="{{ base }}/index.css">
</head>

<body>
    <div class="page-container">
        <header class="page-header">
            <div class="site-title"><a href="{{ base }}/">shiori</a></div>
        </header>
        <main>
            <h1>Edit Bookmark</h1>
            <div class="back-link">
                <a href="{{ base }}/{{ bookmark_id }}">Back</a>
            </div>
            <form class="edit-bookmark-form" action="{{ base }}/{{ bookmark_id }}?_method=PATCH" method="post">
                <input type="hidden" name="updated_at" value="{{ updated_at }}">
                <div class="form-fields">
                    <div class="form-field">
                        <label for="url">URL</label>
                        <input id="url" type="url" name="url" value="{{ url }}" required>
                    </div>
                    <div class="form-field">
                        <label for="title">Title</label>
                        <input id="title" type="text" name="title" value="{{ title }}">
                    </div>
                    <div class="form-field">
                        <label for="comment">Comment</label>
                        <input id="comment" type="text" name="comment" value="{{ comment }}">
                    </div>
                </div>
                <div class="form-submit">
                    <button type="submit">Update</button>
                </div>
            </form>
        </main>
        <footer class="page-footer">
            <div>
                <a href="https://github.com/bouzuya/shiori-web" rel="noopener noreferrer" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>
</body>

</html>
