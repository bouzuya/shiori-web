<!DOCTYPE html>
<html data-color-scheme="{{ color_scheme }}" lang="ja">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>shiori</title>
    <link rel="stylesheet" href="{{ base }}/index.css">
</head>

<body>
    <div class="page landing-page">
        <header class="page-header">
            <div class="site-title"><a href="{% if base == "" %}/{% else %}{{ base }}{% endif %}">shiori</a></div>
        </header>
        <main>
            <h1>Sign Up or Sign In</h1>
            <div class="sign-up-link">
                <a href="{{ base }}/auth/signup">Sign Up</a>
            </div>
            <div class="sign-in-link">
                <a href="{{ base }}/auth/signin">Sign In</a>
            </div>
        </main>
        <footer class="page-footer">
            <div>
                <a href="https://github.com/bouzuya/shiori-web" rel="noopener noreferrer" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>
</body>

</html>
